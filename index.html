<div class="app-wrapper">
  <header>
    <div class="brand-identity">
      <div class="header-top">
        <h1 class="main-logo">NIKE HOOPS</h1>
        <div class="header-controls">
          <input type="text" id="search-bar" placeholder="SEARCH PLAYER / MODEL..." />
          <button id="theme-toggle" class="mode-toggle">DARK MODE</button>
        </div>
      </div>
      <div class="header-details">
        <span class="collection-tag">SPRING / SUMMER 2026</span>
        <span id="live-clock" class="location-tag">00:00:00</span>
      </div>
    </div>
  </header>

  <main class="content-container">
    <section class="drop-group">
      <div class="section-header">
        <h2 class="section-label">Future Releases</h2>
        <span class="status-indicator live">LIVE TRACKING</span>
      </div>
      <div id="future-grid" class="shoe-grid"></div>
    </section>

    <section class="drop-group">
      <div class="section-header">
        <h2 class="section-label">Recent Drops</h2>
      </div>
      <div id="recent-grid" class="shoe-grid"></div>
    </section>
  </main>

  <div id="modal" class="modal-overlay">
    <div class="modal-window">
      <button class="modal-close">&times;</button>
      <div id="modal-body" class="modal-layout"></div>
    </div>
  </div>
</div>
